<!DOCTYPE html>
<html>
<head>
    <title>Hospital AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">HaiDIS
        </div>
        <div class="nav-tabs">
            <a href="first.html" class="nav-item">Situation</a>
            <a href="second.html" class="nav-item">Analysis</a>
            <a href="third.html" class="nav-item">Simulation</a>
        </div>
    </nav>

    <div class="bg-wrapper">
        <h1>Hospital AI Decision Intelligence System</h1>

        <div class="container">
            <h2>What's the situation today?</h2>
        
            <div class="floating-panel">
                
                <div class="card">
                    <h3>Total Patients</h3>
                    <p id="patientsValue">67</p>
                </div>

                <div class="card">
                    <h3>WAITING TIME</h3>
                    <p id="waitingTime">2 hrs</p>
                </div>

                <div class="card">
                    <h3>STAFF ON DUTY</h3>
                    <p id="staffNumber">67</p>
                </div>

                <div class="card">
                    <h3>BEDS</h3>
                    <p id="bedValue">67</p>
                </div>
            </div>
        </div>
    </div>
 <script src="script.js"></script>

</body>
</html>
